<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Topics Editor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/settings.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>
    <header class="masthead">
        <div class="masthead-rule"></div>
        <h1 class="masthead-title"><a href="/">{{ title }}</a></h1>
        <div class="masthead-meta">
            <span>Topics Editor</span>
        </div>
        <div class="masthead-rule"></div>
    </header>

    <main class="settings-main">
        <div id="sections"></div>
        <div class="form-actions">
            <button type="button" class="btn" id="addSection">Add section</button>
        </div>
        <div class="form-actions">
            <button type="button" class="btn btn-primary" id="saveTopics">Save topics</button>
            <span id="saveStatus" class="save-status"></span>
        </div>
    </main>

    <footer class="footer">
        <p>{{ title }} — Topics Editor</p>
    </footer>

    <script>
    var EDITOR_TOKEN = {{ token|json|safe }};
    var TOPICS = {{ topics_json|safe }};
    </script>
    <script src="/static/topics.js"></script>
</body>
</html>
