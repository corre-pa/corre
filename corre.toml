[general]
data_dir = "~/.local/share/corre"
log_level = "info"

[llm]
provider = "openai-compatible"
base_url = "https://api.venice.ai/api/v1"
model = "llama-3.3-70b"
api_key_env = "VENICE_API_KEY"
temperature = 0.3
max_concurrent = 10        # parallel LLM requests; tune to your provider's rate limit

[news]
bind = "192.168.1.101:5555"
title = "Corre News"
editor_token = "edit"   # set to enable /settings and /settings/topics

[mcp.servers.brave-search]
command = "npx"
args = ["-y", "@brave/brave-search-mcp-server"]
env = { BRAVE_API_KEY = "BRAVE_API_KEY" }

# [safety]
# enabled = true                    # toggle the prompt-injection defense layer
# max_output_bytes = 100000         # truncate MCP tool outputs exceeding this size
# sanitize_injections = true        # detect and neutralize prompt injection phrases
# detect_leaks = true               # scan for leaked API keys and credentials
# boundary_wrap = true              # wrap tool outputs in XML delimiters
# high_severity_action = "sanitize" # "warn", "sanitize", or "block"
# custom_block_patterns = []        # additional regex patterns that trigger a block

[[capabilities]]
name = "daily-brief"
description = "Researches topics and produces a daily news briefing"
schedule = "0 0 5 * * *"
mcp_servers = ["brave-search"]
config_path = "config/topics.yml"
enabled = true

[mcp.servers.smtp]
command = "mcp-smtp"
args = []
env = { SMTP_HOST = "SMTP_HOST", SMTP_PORT = "SMTP_PORT", SMTP_USER = "SMTP_USER", SMTP_PASSWORD = "SMTP_PASSWORD", SMTP_FROM = "SMTP_FROM" }

[mcp.servers.telegram]
command = "mcp-telegram"
args = []
env = { TELEGRAM_BOT_TOKEN = "TELEGRAM_BOT_TOKEN" }

[mcp.servers.whatsapp]
command = "mcp-whatsapp"
args = []
env = { WHATSAPP_STORE_PATH = "WHATSAPP_STORE_PATH" }

[[capabilities]]
name = "rolodex"
description = "Daily birthday reminders and contact news digest"
schedule = "0 0 6 * * *"
mcp_servers = ["brave-search", "smtp", "telegram", "whatsapp"]
config_path = "config/rolodex.yml"
enabled = true

# [capabilities.llm]
# model = "gpt-4o"              # override the global model for this capability
# temperature = 0.7             # override temperature
# base_url = "https://..."      # use a different provider entirely
# api_key_env = "OTHER_API_KEY"
# max_concurrent = 5
