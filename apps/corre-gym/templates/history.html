{% extends "base.html" %}

{% block title %}History - Corre Gym{% endblock %}

{% block content %}
<h1>Exercise History</h1>

<div class="filters">
    <label>From <input type="date" id="filter-from"></label>
    <label>To <input type="date" id="filter-to"></label>
    <label>Exercise
        <select id="filter-exercise">
            <option value="">All</option>
        </select>
    </label>
    <button id="btn-apply" class="btn">Apply</button>
    <button id="btn-export" class="btn btn-secondary">Export CSV</button>
</div>

<div class="table-wrap">
    <table id="logs-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Exercise</th>
                <th>Count</th>
                <th>Value</th>
                <th>Type</th>
                <th>Perceived difficulty</th>
                <th>Comment</th>
            </tr>
        </thead>
        <tbody id="logs-body">
            <tr><td colspan="7" class="placeholder">Loading...</td></tr>
        </tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>
{% endblock %}

{% block scripts %}
<script>
    const EXERCISES = {{ exercises_json|safe }};
</script>
<script src="/static/dashboard.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => { initHistory(EXERCISES); });
</script>
{% endblock %}
